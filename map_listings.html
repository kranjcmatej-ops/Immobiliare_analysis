            });
            
            markers.forEach(marker => {
                const isRemoved = marker.removed === true;
                const markerOptions = {
                    color: 'white',
                    fillColor: isRemoved ? '#bdc3c7' : colorMap[marker.color],
                    fillOpacity: isRemoved ? 0.4 : 0.7,
                    weight: isRemoved ? 1 : 2,
                    opacity: isRemoved ? 0.6 : 1,
                    radius: 7,
                    dashArray: isRemoved ? '2, 2' : undefined
                };
                
                const circleMarker = L.circleMarker([marker.lat, marker.lng], markerOptions)
                    .bindPopup(marker.popup);
                
                if (isRemoved) {
                    removedMarkers.addLayer(circleMarker);
                } else {
                    activeMarkers.addLayer(circleMarker);
                }
            });
            
            // Add active markers to map by default
            activeMarkers.addTo(map);
            
            // Add legend with toggle
            const info = L.control({position: 'topleft'});
            info.onAdd = function(map) {
                const div = L.DomUtil.create('div', 'info');
                div.innerHTML = '<h4>Rodano Listings</h4>' +
                    '<div class="legend">' +
                    '<i style="background: #2ecc71;"></i> < €200k<br>' +
                    '<i style="background: #3498db;"></i> €200k - €400k<br>' +
                    '<i style="background: #f39c12;"></i> €400k - €600k<br>' +
                    '<i style="background: #e74c3c;"></i> > €600k<br>' +
                    '</div>' +
                    '<div class="checkbox-item">' +
                    '<input type="checkbox" id="showRemoved" />' +
                    '<label for="showRemoved"> Show removed/sold (0)</label>' +
                    '</div>' +
                    '<div class="stats">' +
                    'Active: 25<br>' +
                    'Removed: 0' +
                    '</div>';
                
                L.DomEvent.disableClickPropagation(div);
                
                const checkbox = div.querySelector('#showRemoved');
                checkbox.addEventListener('change', function(e) {
                    if (e.target.checked) {
                        map.addLayer(removedMarkers);
                    } else {
                        map.removeLayer(removedMarkers);
                    }
                });
                
                // Initialize visibility - removed markers hidden by default
                map.removeLayer(removedMarkers);
                
                return div;
            };
            info.addTo(map);
        </script>
    </body>
    </html>
